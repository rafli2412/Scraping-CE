<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Data Scraper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Web Scraper</h1>
    
    <!-- URL Input Section -->
    <div class="section">
      <label for="targetUrl">Target URL:</label>
      <input 
        type="text" 
        id="targetUrl" 
        placeholder="https://example.com"
        value="">
      <button id="openPageBtn" class="btn btn-primary">Open Page</button>
    </div>

    <!-- Selector Management Section -->
    <div class="section">
      <h3>Define Data to Scrape</h3>
      
      <!-- Manual Selector Input -->
      <div class="selector-input-group">
        <label for="fieldName">Field Name:</label>
        <input 
          type="text" 
          id="fieldName" 
          placeholder="e.g., Product Name">
        
        <label for="cssSelector">CSS Selector:</label>
        <input 
          type="text" 
          id="cssSelector" 
          placeholder="e.g., .product-title">
        
        <button id="addSelectorBtn" class="btn btn-secondary">Add Selector</button>
      </div>

      <!-- Visual Picker (Coming Soon) -->
      <div class="picker-section">
        <button id="togglePickerBtn" class="btn btn-secondary">
          🎯 Pick Element
        </button>
        <p class="hint" id="pickerHint" style="display: none;">
          Click an element on the page to auto-detect its selector
        </p>
      </div>
    </div>

    <!-- Selectors List -->
    <div class="section">
      <h3>Active Selectors</h3>
      <ul id="selectorsList" class="selectors-list">
        <li class="empty">No selectors added yet</li>
      </ul>
    </div>

    <!-- Data Preview Section -->
    <div class="section">
      <h3>Preview Data</h3>
      <button id="scrapeBtn" class="btn btn-success">Scrape Data</button>
      <div id="previewContainer" class="preview-container">
        <p class="empty">No data scraped yet</p>
      </div>
    </div>

    <!-- Export Section -->
    <div class="section">
      <h3>Export</h3>
      <button id="exportJsonBtn" class="btn btn-export">📄 Export JSON</button>
      <button id="exportXlsxBtn" class="btn btn-export">📊 Export XLSX</button>
      <button id="clearDataBtn" class="btn btn-danger">Clear Data</button>
    </div>

    <!-- Status Message -->
    <div id="statusMessage" class="status-message"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
